# fly.toml app configuration file generated for plssworkrailway
#
# See https://fly.io/docs/reference/configuration/ for information

app = "plssworkrailway"
primary_region = "sin"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[vm]
  size = "shared-cpu-1x"
  memory = "512mb"
